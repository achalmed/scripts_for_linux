# Configuración de sincronización de repositorios Git
# ---------------------------------------------------------
# Archivo: repos-config.yml
#
# Editado por install.sh automáticamente la primera vez (base_directory).
# El resto puedes ajustarlo a mano cuando quieras.

# Directorio base donde están todos los repositorios (cada uno en su propia carpeta)
base_directory: ~/Documents/publicaciones

# Lista de repositorios a gestionar.
# - name: debe coincidir exactamente con el nombre de la carpeta del repo
# - branch: rama principal de ese repo (normalmente "main")
# - enabled: true/false — si está en false, sync.sh y status.sh lo ignoran
repositories:
  - name: actus-mercator
    branch: main
    enabled: true

  - name: aequilibria
    branch: main
    enabled: true

  - name: axiomata
    branch: main
    enabled: true

  - name: chaska
    branch: main
    enabled: true

  - name: dialectica-y-mercado
    branch: main
    enabled: true

  - name: epsilon-y-beta
    branch: main
    enabled: true

  - name: methodica
    branch: main
    enabled: true

  - name: numerus-scriptum
    branch: main
    enabled: true

  - name: optimums
    branch: main
    enabled: true

  - name: pecunia-fluxus
    branch: main
    enabled: true

  - name: res-publica
    branch: main
    enabled: true

  - name: website-achalma
    branch: main
    enabled: true

  - name: awesome-ai-prompts
    branch: main
    enabled: true

  - name: scripts_for_zotero
    branch: main
    enabled: true

  - name: scripts_for_quarto
    branch: main
    enabled: true

  - name: scripts_for_libreoffice
    branch: main
    enabled: true

  - name: scripts_for_latex
    branch: main
    enabled: true

  - name: scripts_for_linux
    branch: main
    enabled: true

  - name: scripts_for_calibre
    branch: main
    enabled: true

  - name: Python
    branch: main
    enabled: true

  - name: CampusTeX-Research
    branch: main
    enabled: true

  - name: CampusTeX-Math
    branch: main
    enabled: true

# Mensaje de commit por defecto cuando no se pasa uno con -m
default_commit_message: "update: sincronización automática de contenidos"
