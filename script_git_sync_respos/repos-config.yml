# =============================================================================
# repos-config.yml — Configuración de git-sync
# =============================================================================
# Editado por install.sh automáticamente la primera vez (base_directory).
# El resto ajústalo a mano cuando necesites agregar/quitar/pausar repos.
#
# FORMATO REQUERIDO (el parser es ligero, no es YAML genérico):
#   - 'name' con exactamente 2 espacios + "- " antes
#   - 'branch' y 'enabled' con exactamente 4 espacios antes
#   - No uses comillas, anchors, listas inline ni anidación adicional
# =============================================================================

# Directorio base donde están todos los repositorios (una carpeta por repo)
# Acepta ~ al inicio o ruta absoluta
base_directory: ~/Documents

# Lista de repositorios a gestionar
repositories:

  # ── Blogs de publicación (formato pub_*) ──────────────────────────────────
  - name: pub_actus-mercator
    branch: main
    enabled: true

  - name: pub_aequilibria
    branch: main
    enabled: true

  - name: pub_axiomata
    branch: main
    enabled: true

  - name: pub_chaska
    branch: main
    enabled: true

  - name: pub_dialectica-y-mercado
    branch: main
    enabled: true

  - name: pub_epsilon-y-beta
    branch: main
    enabled: true

  - name: pub_methodica
    branch: main
    enabled: true

  - name: pub_numerus-scriptum
    branch: main
    enabled: true

  - name: pub_optimums
    branch: main
    enabled: true

  - name: pub_pecunia-fluxus
    branch: main
    enabled: true

  - name: pub_res-publica
    branch: main
    enabled: true

  # ── Sitio web principal ───────────────────────────────────────────────────
  - name: website-achalma
    branch: main
    enabled: true

  # ── Scripts y herramientas ────────────────────────────────────────────────
  - name: scripts_for_quarto
    branch: main
    enabled: true

  - name: scripts_for_zotero
    branch: main
    enabled: true

  - name: scripts_for_libreoffice
    branch: main
    enabled: true

  - name: scripts_for_linux
    branch: main
    enabled: true

  - name: scripts_for_latex
    branch: main
    enabled: true

  - name: scripts_for_calibre
    branch: main
    enabled: true

  # ── Proyectos de código ───────────────────────────────────────────────────
  - name: Python
    branch: main
    enabled: true

  - name: awesome-ai-prompts
    branch: main
    enabled: true

  # ── CampusTeX ─────────────────────────────────────────────────────────────
  - name: CampusTeX-Research
    branch: main
    enabled: true

  - name: CampusTeX-Math
    branch: main
    enabled: true

# Mensaje de commit por defecto cuando no se pasa -m
default_commit_message: "update: sincronización automática de contenidos"
